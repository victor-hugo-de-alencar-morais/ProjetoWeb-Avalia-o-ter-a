<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizações Tabajara - Formulário de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <datalist id="listarUsuarios">
        <option th:each="u : ${usuarios}"
            th:value="${u.idUsuario + ' - ' + u.nomeUsuario}">
        </option>
    </datalist>

    <datalist id="listarProdutos">
    <option th:each="p : ${produtos}"
        th:value="${p.idProduto + ' - ' + p.descricaoProduto}"
        th:attr="data-preco=${p.valorProduto}">
    </option>
</datalist>
    
    <p>I. Identificação do Usuário</p>
    <label for="usuario">usuario</label>
    <input list="listarUsuarios" id="usuarios" type="text" placeholder="Digite o nome ou código do usuario">
    <p>II. Adicionar produto ao pedido</p>
    <label for="produto">produto</label>
    <input list="ListarProdutos" id="produto" type="text" placeholder="Digite seu produto" >

    <label for="quantidade">Quantidade</label>
    <input type="number" id="quantidade" placeholder="0" min="1">
    <button type="button" onclick="adicionarItem()">
        <span>+</span> Adicionar
    </button>
    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço unitário</th>
                <th>Subtotal</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="tabela-itens">
            <tr id="empty-row">
                <td colspan="5">Nenhum produto adicionado no pedido</td>
            </tr>
        </tbody>
    </table>

    <span>Total do pedido</span>
    <span>R$ <span id="totalPedido">0,00</span></span>

    <button onclick="salvarPedido()">Confirmar e salvar pedido  </button>

        <script>
    let itens = [];

    function adicionarItem() {
        let produtoInput = document.getElementById("produto").value;
        let quantidade = document.getElementById("quantidade").value;

        if (!produtoInput || quantidade <= 0) {
            alert("Preencha corretamente o produto e a quantidade!");
            return;
        }

        let partes = produtoInput.split(" - ");
        let produtoId = partes[0];
        let produtoNome = partes[1];

        let options = document.querySelectorAll("#listaProdutos option");
        let preco = null;

        options.forEach(opt => {
            if (opt.value === produtoInput) {
                preco = opt.getAttribute("data-preco");
            }
        });

        if (!preco) {
            alert("Produto inválido! Selecione um produto da lista.");
            return;
        }

        let subtotal = quantidade * preco;

        itens.push({
            produto: { idProduto: produtoId },
            nomeProduto: produtoNome,
            quantidade: parseInt(quantidade),
            preco: parseFloat(preco),
            subtotal: subtotal
        });

        document.getElementById("produto").value = "";
        document.getElementById("quantidade").value = "";

        renderTabela();
    }

    function removerItem(index) {
        itens.splice(index, 1);
        renderTabela();
    }

    // NOVO: função para alterar quantidade diretamente na tabela
    function alterarQuantidade(index, novaQuantidade) {

        if (novaQuantidade <= 0) {
            alert("Quantidade inválida!");
            return;
        }

        let item = itens[index];

        item.quantidade = parseInt(novaQuantidade); // atualiza quantidade
        item.subtotal = item.quantidade * item.preco; // recalcula subtotal

        renderTabela(); // atualiza tela
    }

    function renderTabela() {
        let tabela = document.getElementById("tabela-itens");
        let emptyRow = document.getElementById("empty-row");

        tabela.innerHTML = "";

        if (itens.length === 0) {
            tabela.innerHTML = `<tr class="empty-row" id="empty-row"><td colspan="5">Nenhum produto adicionado ao pedido.</td></tr>`;
            document.getElementById("totalPedido").innerText = "0,00";
            return;
        }

        let total = 0;

        itens.forEach((item, index) => {
            total += item.subtotal;

            tabela.innerHTML += `
                <tr>
                    <td>${item.nomeProduto}</td>

                    <!-- ANTIGO: quantidade apenas como texto
                    <td>${item.quantidade}</td>
                    -->

                    <!-- NOVO: campo editável para alterar quantidade -->
                    <td>
                        <input type="number" min="1" value="${item.quantidade}" 
                               onchange="alterarQuantidade(${index}, this.value)" 
                               style="width:60px;">
                    </td>

                    <td>R$ ${item.preco.toFixed(2).replace('.', ',')}</td>
                    <td>R$ ${item.subtotal.toFixed(2).replace('.', ',')}</td>
                    <td>
                        <button class="btn-remove" onclick="removerItem(${index})">
                            Remover
                        </button>
                    </td>
                </tr>
            `;
        });

        document.getElementById("totalPedido").innerText = total.toFixed(2).replace('.', ',');
    }

    function salvarPedido() {
        let clienteInput = document.getElementById("cliente").value;

        if (!clienteInput) {
            alert("Selecione um cliente antes de salvar!");
            return;
        }

        if (itens.length === 0) {
            alert("Adicione ao menos um produto ao pedido!");
            return;
        }

        let clienteId = clienteInput.split(" - ")[0];

        let pedido = {
            cliente: { idCliente: clienteId },
            itens: itens
        };

        fetch("/pedidos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pedido)
        })
        .then(res => res.json())
        .then(data => {
            alert("Pedido salvo com sucesso!");
            location.reload();
        })
        .catch(err => {
            alert("Erro ao salvar o pedido. Tente novamente.");
            console.error(err);
        });
    }
</script>
   
</body>
</html>
