<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizações Tabajara - Login</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .login-container {
            max-width: 480px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        
        .login-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        
        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            font-size: 0.9rem;
            opacity: 0.95;
        }
        
        .login-body {
            padding: 2rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-label i {
            color: #667eea;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            outline: none;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #a0aec0;
            z-index: 10;
            background: white;
            padding-left: 5px;
        }
        
        .toggle-password:hover {
            color: #667eea;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.875rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .forgot-link {
            text-align: right;
            margin-top: 0.5rem;
        }
        
        .forgot-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .forgot-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .btn-back {
            background-color: #718096;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            margin-top: 1rem;
            font-weight: 500;
        }
        
        .btn-back:hover {
            background-color: #4a5568;
            transform: translateX(-5px);
            color: white;
        }
        
        .alert-custom {
            border-radius: 12px;
            padding: 0.875rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .alert-custom i {
            font-size: 1.2rem;
        }
        
        .alert-danger {
            background-color: #fed7d7;
            border-left: 4px solid #e53e3e;
            color: #742a2a;
        }
        
        .alert-success {
            background-color: #c6f6d5;
            border-left: 4px solid #38a169;
            color: #22543d;
        }
        
        .register-prompt {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }
        
        .register-prompt p {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 0;
        }
        
        .register-prompt a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-prompt a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 576px) {
            .login-body {
                padding: 1.5rem;
            }
            
            .login-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h1 class="login-title">Bem-vindo de volta!</h1>
                <p class="login-subtitle">Faça login para acessar o sistema</p>
            </div>
            
            <div class="login-body">
                <!-- Mensagens de erro/sucesso -->
                <div th:if="${param.error}" class="alert-custom alert-danger">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>Credenciais inválidas. Tente novamente.</span>
                </div>
                
                <div th:if="${param.logout}" class="alert-custom alert-success">
                    <i class="bi bi-check-circle-fill"></i>
                    <span>Logout efetuado com sucesso.</span>
                </div>
                
                <!-- Formulário de Login -->
                <form th:action="@{/login}" method="post">
                    <div class="mb-4">
                        <label for="username" class="form-label">
                            <i class="bi bi-person-fill"></i>
                            Login
                        </label>
                        <input type="text" 
                               class="form-control" 
                               id="username" 
                               name="username" 
                               required 
                               placeholder="Digite seu login"
                               autocomplete="username">
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock-fill"></i>
                            Senha
                        </label>
                        <div class="input-group">
                            <input type="password" 
                                   class="form-control" 
                                   id="password" 
                                   name="password" 
                                   required 
                                   placeholder="Digite sua senha"
                                   autocomplete="current-password">
                            <i class="bi bi-eye-slash toggle-password" onclick="togglePassword('password', this)"></i>
                        </div>
                    </div>
                    
                    <div class="forgot-link">
                        <a href="/esqueci-senha">
                            <i class="bi bi-question-circle"></i> Esqueci minha senha
                        </a>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <i class="bi bi-box-arrow-in-right"></i>
                        Entrar no Sistema
                    </button>
                </form>
                
                <div class="register-prompt">
                    <p>Não tem uma conta? <a th:href="@{/usuarios/criar}">Registre-se aqui</a></p>
                </div>
                
                <!-- Botão Voltar -->
                <form action="/" method="get">
                    <button type="submit" class="btn-back">
                        <i class="bi bi-arrow-left"></i>
                        Voltar para página inicial
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // Função para alternar visibilidade da senha
        function togglePassword(fieldId, element) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
                element.classList.remove('bi-eye-slash');
                element.classList.add('bi-eye');
            } else {
                field.type = 'password';
                element.classList.remove('bi-eye');
                element.classList.add('bi-eye-slash');
            }
        }
        
        // Adicionar efeito de loading ao submit
        document.querySelector('form').addEventListener('submit', function(e) {
            const submitBtn = this.querySelector('.btn-login');
            if (submitBtn) {
                submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Entrando...';
                submitBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
